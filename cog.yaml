build:
  gpu: true
  cuda: "11.8"
  python_version: "3.11"
  python_requirements: "requirements.txt"
  system_packages:
    - ffmpeg
    - libsm6
    - libxext6
  run:
    - "pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl"

predict: "predict.py:Predictor"