version: "3.9"

services:
  ml-backend:
    build:
      context: .
      dockerfile: docker/ml-backend.Dockerfile
    container_name: identifai-ml
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FORCE_CPU: "1"
      WHISPER_MODEL: "base"
      CPU_THREADS: "4"
      MAX_PROMPT_CHARS: "900"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  api:
    build:
      context: ./frontend/server
      dockerfile: Dockerfile
    container_name: identifai-api
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: development
      ML_BACKEND_URL: http://ml-backend:8000
    depends_on:
      ml-backend:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./frontend/client
      dockerfile: Dockerfile
    container_name: identifai-client
    ports:
      - "3001:3001"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: 3001
      REACT_APP_PYTHON_API_URL: http://localhost:5001/api/ml
    depends_on:
      - api
    restart: unless-stopped
